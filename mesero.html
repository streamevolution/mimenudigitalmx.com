    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCg3yObk6x5NDkbc5w0N2oPU1V0mmvQs9w", 
            authDomain: "mimenu-digital.firebaseapp.com",
            projectId: "mimenu-digital",
            storageBucket: "mimenu-digital.firebasestorage.app",
            messagingSenderId: "129063923724",
            appId: "1:129063923724:web:6297dda94753bea2a53e29"
        };
        firebase.initializeApp(firebaseConfig);
        const dbFirestore = firebase.firestore();

        // Variables Globales y Credenciales
        let slugTiendaGlobal = localStorage.getItem('meseroSlug') || '';
        let sucursalActivaGlobal = localStorage.getItem('meseroSucursal') || '';
        let correoMeseroActual = localStorage.getItem('meseroCorreo') || '';
        let passwordMeseroActual = localStorage.getItem('meseroPassword') || '';
        let nombreMeseroActual = localStorage.getItem('meseroNombre') || '';
        
        let tiendaData = null;
        let menuData = [];
        let categoriasOrdenadas = [];
        let sucursalesData = []; 
        let cart = {};
        let currentModalItemId = null;
        let currentModalQty = 1;
        
        // Control de Mesas
        let misMesasActivas = [];
        let mesasOcupadasGlobales = []; 
        let misMesasListener = null;

        // El Token de sesión ahora estará basado en el correo del mesero para mayor trazabilidad
        let tokenMesero = correoMeseroActual ? `Mesero_${correoMeseroActual}` : ("Mesero_" + Math.random().toString(36).substring(2, 9));

        // ==========================================
        // LÓGICA DE LOGIN EMPAQUETADO (0 LECTURAS EXTRA)
        // ==========================================

        function checkInitialState() {
            if (slugTiendaGlobal && sucursalActivaGlobal && correoMeseroActual && passwordMeseroActual) {
                document.getElementById('login-view').classList.add('hidden');
                checkCacheAndLoad();
            } else {
                document.getElementById('login-view').classList.remove('hidden');
            }
        }

        async function iniciarSesionMesero() {
            const inputSlug = document.getElementById('input-tienda-id').value.trim();
            const inputEmail = document.getElementById('input-email').value.trim().toLowerCase();
            const inputPassword = document.getElementById('input-password').value.trim();
            const btn = document.getElementById('btn-login');
            
            if (!inputSlug || !inputEmail || !inputPassword) {
                showCustomAlert("Por favor, llena todos los campos para ingresar.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verificando Credenciales...";

            try {
                // Hacemos UNA sola lectura de la tienda (que de todas formas necesitábamos para el menú)
                const docTienda = await dbFirestore.collection('tiendas').doc(inputSlug).get();
                
                if (docTienda.exists) {
                    const data = docTienda.data();
                    const listaMeseros = data.meseros || [];
                    
                    // Buscamos si existe un mesero con ese correo y contraseña exactos
                    const meseroValido = listaMeseros.find(m => m.email.toLowerCase() === inputEmail && m.password === inputPassword);
                    
                    if (meseroValido) {
                        // ¡Login Exitoso! Asignamos automáticamente su sucursal
                        slugTiendaGlobal = inputSlug;
                        sucursalActivaGlobal = meseroValido.sucursalId;
                        correoMeseroActual = meseroValido.email;
                        passwordMeseroActual = meseroValido.password;
                        nombreMeseroActual = meseroValido.nombre;
                        tokenMesero = `Mesero_${correoMeseroActual}`;

                        // Guardar permanentemente
                        localStorage.setItem('meseroSlug', slugTiendaGlobal);
                        localStorage.setItem('meseroSucursal', sucursalActivaGlobal);
                        localStorage.setItem('meseroCorreo', correoMeseroActual);
                        localStorage.setItem('meseroPassword', passwordMeseroActual);
                        localStorage.setItem('meseroNombre', nombreMeseroActual);
                        localStorage.setItem('tokenMesero', tokenMesero);

                        tiendaData = data;
                        localStorage.setItem(`meseroTienda_${slugTiendaGlobal}`, JSON.stringify(tiendaData));
                        
                        document.getElementById('login-view').classList.add('hidden');
                        
                        // En lugar de volver a descargar la tienda, descargamos solo los productos
                        const snapshotProductos = await dbFirestore.collection('productos').where('tiendaId', '==', slugTiendaGlobal).get();
                        menuData = [];
                        snapshotProductos.forEach(doc => {
                            let p = doc.data();
                            p.id = doc.id;
                            menuData.push(p);
                        });
                        localStorage.setItem(`meseroMenu_${slugTiendaGlobal}`, JSON.stringify(menuData));
                        
                        procesarDatosDeTienda();
                        
                    } else {
                        showCustomAlert("Correo o contraseña incorrectos. Verifica tus datos con el administrador.");
                    }
                } else {
                    showCustomAlert(`No encontramos el restaurante "${inputSlug}". Revisa que esté bien escrito.`);
                }
            } catch (error) {
                console.error("Error", error);
                showCustomAlert("Error de conexión. Intenta de nuevo.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Ingresar al Sistema";
            }
        }

        function cerrarSesionMesero(expulsado = false) {
            const mensaje = expulsado ? 
                "Tu acceso ha sido revocado por el administrador. Serás desconectado." : 
                "¿Seguro que deseas cerrar sesión?";
                
            if(expulsado || confirm(mensaje)) {
                localStorage.removeItem('meseroSlug');
                localStorage.removeItem('meseroSucursal');
                localStorage.removeItem('meseroCorreo');
                localStorage.removeItem('meseroPassword');
                localStorage.removeItem('meseroNombre');
                localStorage.removeItem(`meseroTienda_${slugTiendaGlobal}`);
                localStorage.removeItem(`meseroMenu_${slugTiendaGlobal}`);
                location.reload();
            }
        }

        function checkCacheAndLoad() {
            const cacheTienda = localStorage.getItem(`meseroTienda_${slugTiendaGlobal}`);
            const cacheMenu = localStorage.getItem(`meseroMenu_${slugTiendaGlobal}`);

            if (cacheTienda && cacheMenu) {
                tiendaData = JSON.parse(cacheTienda);
                menuData = JSON.parse(cacheMenu);
                procesarDatosDeTienda();
                // Opcional: Podrías hacer un refresh silencioso de fondo aquí para verificar si sigue siendo válido.
                // Lo haremos forzoso cuando le den "Sincronizar".
            } else {
                forceRefreshData();
            }
        }

        async function forceRefreshData() {
            const loadingScreen = document.getElementById('loading-screen');
            const mainApp = document.getElementById('main-app-view');
            
            loadingScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');

            try {
                const docTienda = await dbFirestore.collection('tiendas').doc(slugTiendaGlobal).get();
                if (docTienda.exists) {
                    const data = docTienda.data();
                    
                    // VERIFICACIÓN DE SEGURIDAD (EXPULSIÓN)
                    const listaMeseros = data.meseros || [];
                    const sigueActivo = listaMeseros.some(m => m.email.toLowerCase() === correoMeseroActual && m.password === passwordMeseroActual);
                    
                    if(!sigueActivo) {
                        cerrarSesionMesero(true); // Fue eliminado del panel admin
                        return;
                    }
                    
                    tiendaData = data;
                    localStorage.setItem(`meseroTienda_${slugTiendaGlobal}`, JSON.stringify(tiendaData));
                } else {
                    cerrarSesionMesero(true); // La tienda dejó de existir
                    return;
                }

                const snapshotProductos = await dbFirestore.collection('productos').where('tiendaId', '==', slugTiendaGlobal).get();
                menuData = [];
                snapshotProductos.forEach(doc => {
                    let p = doc.data();
                    p.id = doc.id;
                    menuData.push(p);
                });
                localStorage.setItem(`meseroMenu_${slugTiendaGlobal}`, JSON.stringify(menuData));

                procesarDatosDeTienda();

            } catch (error) {
                console.error("Error sincronizando:", error);
                showCustomAlert("Hubo un error de conexión al sincronizar.");
                if(localStorage.getItem(`meseroTienda_${slugTiendaGlobal}`)) {
                    checkCacheAndLoad(); 
                }
            } finally {
                loadingScreen.classList.add('hidden');
            }
        }

            if (tiendaData.apariencia && tiendaData.apariencia.logo) {
                document.getElementById('header-logo').src = tiendaData.apariencia.logo;

            sucursalesData = tiendaData.sucursales || [];
            categoriasOrdenadas = tiendaData.categorias || [];

            document.getElementById('main-app-view').classList.remove('hidden');
            document.getElementById('main-app-view').classList.add('flex');

        function iniciarListenerMesas() {
            if(misMesasListener) misMesasListener();
            
            misMesasListener = dbFirestore.collection('mesas_activas')
                .where('tiendaId', '==', slugTiendaGlobal)
                .where('sucursalId', '==', sucursalActivaGlobal)
                .onSnapshot(snapshot => {
                    misMesasActivas = [];
                    mesasOcupadasGlobales = [];
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        mesasOcupadasGlobales.push(String(data.mesaId));
                        
                        if (data.sessionToken === tokenMesero) {
                            misMesasActivas.push({ id: doc.id, ...data });
                        }
                    });
                    
                    if(!document.getElementById('mis-mesas-modal').classList.contains('hidden')) {
                        renderizarMisMesas();
                    }
                    
                    actualizarBadgeMisMesas();
                    actualizarOpcionesMesaCarrito();
                });
        }

        function actualizarBadgeMisMesas() {
            const btnFab = document.getElementById('fab-mis-mesas');
            const badge = document.getElementById('badge-mis-mesas');
            
            if (misMesasActivas.length > 0) {
                btnFab.classList.remove('hidden');
                badge.innerText = misMesasActivas.length;
                badge.classList.remove('hidden');
            } else {
                btnFab.classList.add('hidden');
                badge.classList.add('hidden');
            }
        }

        function actualizarOpcionesMesaCarrito() {
            const selectMesa = document.getElementById('select-mesa');
            const sucActual = sucursalesData.find(s => String(s.id) === String(sucursalActivaGlobal));
            
            if (!sucActual) return;
            
            const valorActual = selectMesa.value;
            selectMesa.innerHTML = '';
            
            let opcionesDisponibles = 0;
            
            for (let i = 1; i <= (sucActual.cantidadMesas || 0); i++) {
                const mesaStr = String(i);
                const estaOcupadaGlobalmente = mesasOcupadasGlobales.includes(mesaStr);
                const esDeEsteMesero = misMesasActivas.some(m => String(m.mesaId) === mesaStr);
                
                if (!estaOcupadaGlobalmente || esDeEsteMesero) {
                    const extraText = esDeEsteMesero ? ' (Agregar a mi mesa)' : '';
                    selectMesa.innerHTML += `<option value="${i}">Mesa ${i}${extraText}</option>`;
                    opcionesDisponibles++;
                }
            }
            
            if (opcionesDisponibles === 0) {
                selectMesa.innerHTML = '<option value="">❌ Lleno, no hay mesas disponibles</option>';
            } else {
                selectMesa.innerHTML = '<option value="">-- Selecciona el número de Mesa --</option>' + selectMesa.innerHTML;
                
                if (valorActual) {
                    const existe = Array.from(selectMesa.options).some(opt => opt.value === valorActual);
                    if (existe) selectMesa.value = valorActual;
                }
            }
        }

        async function liberarMesaMesero(docId, generarPDF) {
            const mensaje = generarPDF 
                ? '¿Seguro que deseas cobrar, liberar esta mesa y generar el ticket en PDF?' 
                : '¿Seguro que deseas liberar esta mesa sin generar ticket? El pedido se borrará.';
                
            if(confirm(mensaje)) {
                if (generarPDF) {
                    await generarTicketPDFMesero(docId);
                }
                
                dbFirestore.collection('mesas_activas').doc(docId).delete()
                    .catch(e => console.error("Error al liberar mesa:", e));
            }
        }

        function generarTicketPDFMesero(docId) {
            return new Promise((resolve) => {
                try {
                    const mesaActiva = misMesasActivas.find(m => m.id === docId);
                    if(!mesaActiva) return resolve();
                    
                    const sucActual = sucursalesData.find(s => String(s.id) === String(sucursalActivaGlobal));
                    const nombreTienda = tiendaData.nombreTienda || 'Restaurante';
                    
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ unit: 'mm', format: [80, 200] });

                    let y = 10;
                    const centerX = 40; 
                    
                    const crearContenido = (logoDataUrl = null) => {
                        if (logoDataUrl) {
                            // Centrar logo de 20x20mm
                            doc.addImage(logoDataUrl, 'PNG', 30, y, 20, 20);
                            y += 24;
                        } else {
                            y += 5;
                        }

                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(14);
                        doc.text(nombreTienda, centerX, y, { align: "center" });
                        y += 6;
                        
                        doc.setFont("helvetica", "normal");
                        doc.setFontSize(10);
                        if (sucActual) {
                            doc.text(sucActual.nombre, centerX, y, { align: "center" });
                            y += 5;
                            const dirLines = doc.splitTextToSize(sucActual.direccion || '', 70);
                            doc.text(dirLines, centerX, y, { align: "center" });
                            y += (dirLines.length * 4) + 2;
                        }
                        
                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(12);
                        doc.text(`MESA: ${mesaActiva.mesaId}`, centerX, y, { align: "center" });
                        y += 6;

                        // Agregar Fecha y Hora
                        const fechaActual = new Date();
                        const fechaStr = fechaActual.toLocaleDateString('es-MX');
                        const horaStr = fechaActual.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                        doc.setFont("helvetica", "normal");
                        doc.setFontSize(9);
                        doc.text(`Fecha: ${fechaStr} ${horaStr}`, centerX, y, { align: "center" });
                        y += 6;
                        
                        doc.setLineWidth(0.5);
                        doc.line(5, y, 75, y);
                        y += 4;
                        
                        let total = 0;
                        const tableData = [];
                        for (const [prodId, qty] of Object.entries(mesaActiva.pedido)) {
                            const item = menuData.find(i => i.id == prodId);
                            const nombre = item ? item.nombre || item.name : 'Producto';
                            const precio = item ? Number(item.precio || item.price) : 0;
                            const subtotal = precio * qty;
                            total += subtotal;
                            tableData.push([`${qty}x ${nombre}`, `$${subtotal.toFixed(2)}`]);
                        }

                        doc.autoTable({
                            startY: y,
                            head: [['Cant. Artículo', 'Subtotal']],
                            body: tableData,
                            theme: 'plain',
                            styles: { fontSize: 9, cellPadding: 1, overflow: 'linebreak', font: 'helvetica' },
                            columnStyles: { 1: { halign: 'right', cellWidth: 20 } },
                            margin: { left: 5, right: 5 }
                        });

                        y = doc.lastAutoTable.finalY + 5;
                        doc.line(5, y, 75, y);
                        y += 5;
                        
                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        doc.text("TOTAL:", 5, y);
                        doc.text(`$${total.toFixed(2)}`, 75, y, { align: "right" });
                        y += 10;
                        
                        doc.setFontSize(10);
                        doc.setFont("helvetica", "italic");
                        doc.text("¡Gracias por su visita!", centerX, y, { align: "center" });
                        y += 5;
                        // Mostrar el nombre del mesero actual
                        doc.text("Atendido por: " + (nombreMeseroActual || "Mesero en turno"), centerX, y, { align: "center" });
                        
                        doc.save(`Ticket_Mesa_${mesaActiva.mesaId}.pdf`);
                        resolve();
                    };

                    if (tiendaData && tiendaData.apariencia && tiendaData.apariencia.logo) {
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            const dataUrl = canvas.toDataURL('image/png');
                            crearContenido(dataUrl);
                        };
                        img.onerror = function() {
                            crearContenido(null);
                        };
                        img.src = tiendaData.apariencia.logo;
                    } else {
                        crearContenido(null);
                    }

                } catch(e) {
                    console.error("Error generando PDF:", e);
                    alert("No se pudo generar el PDF. Verifica que tu navegador permita descargas.");
                    resolve();
                }
            });
        }

        function setupScrollSpy() {
            const sections = document.querySelectorAll('[id^="cat-"]');
            const pills = document.querySelectorAll('.cat-pill');

            const observerOptions = { root: null, rootMargin: '-20% 0px -70% 0px', threshold: 0 };
            const observer = new IntersectionObserver((entries) => {
                if (window.scrollY < 100) return; 

                const intersectingEntries = entries.filter(e => e.isIntersecting);
                if (intersectingEntries.length > 0) {
                    pills.forEach(pill => {
                        pill.className = "whitespace-nowrap px-[18px] py-[7px] bg-white text-gray-600 hover:text-gray-800 rounded-full text-[13px] font-bold transition-colors ios-shadow border border-gray-100 cat-pill";
                    });
                    const activeId = `nav-pill-${intersectingEntries[0].target.id}`;
                    const activePill = document.getElementById(activeId);
                    if (activePill) {
                        activePill.className = "whitespace-nowrap px-[18px] py-[7px] bg-gray-800 text-white rounded-full text-[13px] font-bold transition-colors ios-shadow border border-gray-800 cat-pill active-pill";
                        activePill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }
            }, observerOptions);

            sections.forEach(sec => observer.observe(sec));
            
            window.addEventListener('scroll', () => {
                if(window.scrollY < 100) {
                    pills.forEach(pill => {
                        pill.className = "whitespace-nowrap px-[18px] py-[7px] bg-white text-gray-600 hover:text-gray-800 rounded-full text-[13px] font-bold transition-colors ios-shadow border border-gray-100 cat-pill";
                    });
                    const todoPill = document.getElementById('nav-pill-todo');
                    if(todoPill) todoPill.className = "whitespace-nowrap px-[18px] py-[7px] bg-gray-800 text-white rounded-full text-[13px] font-bold transition-colors ios-shadow border border-gray-800 cat-pill active-pill";
                }
            });
        }

        function updateItemModalUI() {
            const item = menuData.find(i => i.id == currentModalItemId);
            document.getElementById('modal-qty').innerText = currentModalQty;
            const btn = document.getElementById('modal-add-btn');
            const precio = Number(item.precio || item.price);
            
            if (currentModalQty === 0 && cart[currentModalItemId]) {
                btn.innerText = "Quitar de la orden";
                btn.className = "flex-1 bg-gray-100 text-red-600 font-bold py-3.5 rounded-[14px] transition-colors active:scale-95";
                document.getElementById('modal-price').innerText = `$0.00`;
            } else {
                const totalModalPrice = (precio * (currentModalQty || 1)).toFixed(2);
                document.getElementById('modal-price').innerText = `$${precio.toFixed(2)}`;
                btn.innerText = currentModalQty === 0 ? "Cancelar" : `Agregar • $${totalModalPrice}`;
                btn.className = "flex-1 bg-orange-600 text-white font-bold py-3.5 rounded-[14px] shadow-md transition-colors active:scale-95";
            }
        }

        function confirmAdd() {
            if (currentModalQty > 0) cart[currentModalItemId] = currentModalQty;
            else delete cart[currentModalItemId];
            closeItemModal(); 
            initMenu(); 
            updateCartFAB();

        function updateCartFAB() {
            const fab = document.getElementById('fab-cart');
            let totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
            document.getElementById('fab-badge').innerText = totalItems;
            
            if (totalItems > 0) {
                fab.classList.remove('hidden');
                void fab.offsetWidth; 
                fab.classList.remove('scale-out');
                fab.classList.add('scale-in');
            } else {
                fab.classList.remove('scale-in');
                fab.classList.add('scale-out');
                if(!document.getElementById('cart-modal').classList.contains('hidden')) closeCartModal();
                setTimeout(() => { if(totalItems === 0) fab.classList.add('hidden'); }, 300);
            }
        }

        function openCartModal() {
            renderCartItems();
            actualizarOpcionesMesaCarrito();

            const modal = document.getElementById('cart-modal');
            const content = document.getElementById('cart-modal-content');
            modal.classList.remove('hidden'); document.body.classList.add('modal-open');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0'); content.classList.remove('slide-down'); content.classList.add('slide-up');
        }

        function closeCartModal() {
            const modal = document.getElementById('cart-modal');
            const content = document.getElementById('cart-modal-content');
            modal.classList.add('opacity-0'); content.classList.remove('slide-up'); content.classList.add('slide-down');
            document.body.classList.remove('modal-open');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function updateCartQty(id, change) {
            cart[id] += change;
            if (cart[id] <= 0) delete cart[id];
            initMenu(); updateCartFAB(); renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            let html = ''; let total = 0;

            for (const [id, qty] of Object.entries(cart)) {
                const item = menuData.find(i => i.id == id);
                if(!item) continue;
                const precio = Number(item.precio || item.price);
                const subtotal = precio * qty; 
                total += subtotal;
                
                html += `
                <div class="bg-white p-3 rounded-[12px] border border-gray-100 flex items-center justify-between shadow-sm">
                    <div class="flex-1 pr-2">
                        <h4 class="font-bold text-[14px] text-gray-900 leading-tight">${item.nombre || item.name}</h4>
                        <p class="text-[#2d7d9a] font-bold text-[13px] mt-0.5">$${subtotal.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center bg-[#F2F2F7] rounded-[10px] p-1">
                        <button onclick="updateCartQty('${id}', -1)" class="w-8 h-8 flex items-center justify-center text-gray-700 font-bold bg-white rounded-[8px] shadow-sm active:scale-95">-</button>
                        <span class="font-bold text-gray-900 w-8 text-center text-[15px]">${qty}</span>
                        <button onclick="updateCartQty('${id}', 1)" class="w-8 h-8 flex items-center justify-center text-orange-600 font-bold bg-white rounded-[8px] shadow-sm active:scale-95">+</button>
                    </div>
                </div>`;
            }
            container.innerHTML = html; 
            document.getElementById('cart-modal-total').innerText = `$${total.toFixed(2)}`;
        }

        // ==========================================
        // ENVÍO DE ORDEN A COCINA
        // ==========================================

        async function enviarOrdenACocina() {
            const mesaId = document.getElementById('select-mesa').value;

            if (!mesaId) {
                showCustomAlert("Por favor, selecciona el número de Mesa antes de enviar la comanda.");
                return;
            }

            if (Object.keys(cart).length === 0) {
                showCustomAlert("La comanda está vacía.");
                return;
            }

            const btn = document.getElementById('btn-enviar-orden');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Procesando...";
            btn.disabled = true;

            try {
                const docId = `${slugTiendaGlobal}_${sucursalActivaGlobal}_mesa_${mesaId}`;
                const docRef = dbFirestore.collection('mesas_activas').doc(docId);
                const docSnap = await docRef.get();
                
                let pedidoActual = {};
                if (docSnap.exists) {
                    pedidoActual = docSnap.data().pedido || {};
                }
                
                for (const [id, qty] of Object.entries(cart)) {
                    pedidoActual[id] = (pedidoActual[id] || 0) + qty;
                }

                await docRef.set({
                    tiendaId: slugTiendaGlobal,
                    sucursalId: sucursalActivaGlobal,
                    mesaId: mesaId,
                    estado: 'Ocupado',
                    pedido: pedidoActual,
                    sessionToken: tokenMesero, 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                showCustomAlert(`¡Comanda enviada a cocina exitosamente para la Mesa ${mesaId}!`, "Orden Enviada");
                
                cart = {};
                updateCartFAB();
                initMenu();
                closeCartModal();
                document.getElementById('select-mesa').value = "";

            } catch (error) {
                console.error("Error enviando orden:", error);
                showCustomAlert("Ocurrió un error al enviar la orden. Verifica la conexión.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        
        function showCustomAlert(message, title = "Aviso") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-message').innerText = message;
            
            const modal = document.getElementById('custom-alert');
            const bg = document.getElementById('custom-alert-bg');
            const content = document.getElementById('custom-alert-content');
            
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            
            bg.classList.remove('opacity-0');
            content.classList.remove('scale-90', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }

        function closeCustomAlert() {
            const modal = document.getElementById('custom-alert');
            const bg = document.getElementById('custom-alert-bg');
            const content = document.getElementById('custom-alert-content');
            
            bg.classList.add('opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => { modal.classList.add('hidden'); }, 200);
        }

        // Arrancar
        window.onload = checkInitialState;
    </script>
</body>
</html>
