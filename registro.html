<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMenú Digital MX - Crea tu tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#F2F2F7] text-gray-900 min-h-screen flex flex-col antialiased">

    <header class="bg-white shadow-sm border-b border-gray-200 py-3 px-4 sm:px-6 flex justify-between items-center">
        <!-- Texto más chico y en una sola línea -->
        <h1 class="text-lg sm:text-xl font-black text-orange-600 tracking-tight whitespace-nowrap">MiMenú Digital MX</h1>
        <button onclick="toggleForm()" id="btn-toggle" class="text-xs sm:text-sm font-bold text-gray-600 hover:text-orange-600 transition-colors">
            Ya tengo cuenta (Iniciar sesión)
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-6">
        
        <div id="register-container" class="bg-white p-6 sm:p-8 rounded-[32px] shadow-lg w-full max-w-2xl border border-gray-100">
            <div class="text-center mb-8">
                <h2 class="text-[24px] sm:text-[26px] font-black text-gray-900 tracking-tight">Crea tu Menú Digital</h2>
                <p class="text-gray-500 font-medium mt-1 text-sm sm:text-base">Registra tu negocio y comienza a vender hoy mismo.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Nombres</label>
                    <input type="text" id="reg-nombres" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Apellidos</label>
                    <input type="text" id="reg-apellidos" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Ciudad</label>
                    <input type="text" id="reg-ciudad" placeholder="Ej. Pachuca, CDMX..." class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Correo Electrónico</label>
                    <input type="email" id="reg-correo" oninput="validarCampos('reg-correo', 'reg-correo-conf', 'correo-feedback')" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Confirmar Correo</label>
                    <input type="email" id="reg-correo-conf" oninput="validarCampos('reg-correo', 'reg-correo-conf', 'correo-feedback')" class="w-full bg-[#F2F2F7] border-2 border-transparent rounded-xl px-4 py-3 outline-none transition-all">
                    <span id="correo-feedback" class="hidden"></span>
                </div>
                
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Número (WhatsApp)</label>
                    <input type="tel" id="reg-numero" oninput="validarCampos('reg-numero', 'reg-numero-conf', 'numero-feedback')" placeholder="10 dígitos" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Confirmar Número</label>
                    <input type="tel" id="reg-numero-conf" oninput="validarCampos('reg-numero', 'reg-numero-conf', 'numero-feedback')" class="w-full bg-[#F2F2F7] border-2 border-transparent rounded-xl px-4 py-3 outline-none transition-all">
                    <span id="numero-feedback" class="hidden"></span>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Contraseña</label>
                    <input type="password" id="reg-pass" oninput="validarCampos('reg-pass', 'reg-pass-conf', 'pass-feedback')" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Confirmar Contraseña</label>
                    <input type="password" id="reg-pass-conf" oninput="validarCampos('reg-pass', 'reg-pass-conf', 'pass-feedback')" class="w-full bg-[#F2F2F7] border-2 border-transparent rounded-xl px-4 py-3 outline-none transition-all">
                    <span id="pass-feedback" class="hidden"></span>
                </div>

                <div class="md:col-span-2 pt-4 border-t border-gray-100 mt-2">
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Nombre de tu Tienda</label>
                    <input type="text" id="reg-tienda-nombre" placeholder="Ej. Sushi Ramírez" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Enlace para tu tienda (Solo minúsculas y guiones)</label>
                    <div class="flex items-center">
                        <span class="bg-gray-200 text-gray-600 px-4 py-3 rounded-l-xl border-r border-gray-300 font-medium text-sm hidden sm:block">mimenudigitalmx.com/</span>
                        <input type="text" id="reg-tienda-enlace" oninput="formatSlug(this)" placeholder="sushi-ramirez" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-r-xl sm:rounded-l-none rounded-xl px-4 py-3 outline-none transition-all font-mono text-orange-600 font-bold">
                    </div>
                    <p id="enlace-status" class="text-xs mt-1.5 font-semibold"></p>
                </div>
            </div>

            <button id="btn-registrar" onclick="registrarUsuario()" class="w-full mt-8 bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-[16px] shadow-md transition-transform active:scale-[0.98] text-[16px]">
                Crear mi Tienda
            </button>
            <p id="reg-error" class="text-red-500 text-sm text-center font-bold mt-4 hidden"></p>
        </div>

        <div id="login-container" class="bg-white p-8 rounded-[32px] shadow-lg w-full max-w-sm border border-gray-100 hidden">
            <div class="text-center mb-8">
                <h2 class="text-[26px] font-black text-gray-900 tracking-tight">Bienvenido</h2>
                <p class="text-gray-500 font-medium mt-1">Ingresa para administrar tu menú.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Correo Electrónico</label>
                    <input type="email" id="login-correo" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Contraseña</label>
                    <input type="password" id="login-pass" class="w-full bg-[#F2F2F7] border border-transparent focus:border-orange-500 focus:bg-white rounded-xl px-4 py-3 outline-none transition-all">
                </div>
                <button onclick="recuperarPassword()" class="text-xs font-bold text-orange-600 hover:underline">¿Olvidaste tu contraseña?</button>
            </div>
            <button id="btn-login" onclick="iniciarSesion()" class="w-full mt-6 bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-[16px] shadow-md transition-transform active:scale-[0.98] text-[16px]">
                Ingresar
            </button>
            <p id="login-error" class="text-red-500 text-sm text-center font-bold mt-4 hidden"></p>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 text-center py-5 text-xs font-semibold text-gray-400 mt-auto flex-shrink-0">
        © 2026 Creado por Juan Zamora. Todos los derechos reservados.
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCg3yObk6x5NDkbc5w0N2oPU1V0mmvQs9w", 
            authDomain: "mimenu-digital.firebaseapp.com",
            projectId: "mimenu-digital",
            storageBucket: "mimenu-digital.firebasestorage.app",
            messagingSenderId: "129063923724",
            appId: "1:129063923724:web:6297dda94753bea2a53e29"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginView = false;
        
        function toggleForm() {
            isLoginView = !isLoginView;
            document.getElementById('register-container').classList.toggle('hidden', isLoginView);
            document.getElementById('login-container').classList.toggle('hidden', !isLoginView);
            document.getElementById('btn-toggle').innerText = isLoginView ? "Crear una tienda nueva" : "Ya tengo cuenta (Iniciar sesión)";
            
            document.getElementById('reg-error').classList.add('hidden');
            document.getElementById('login-error').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('view') === 'login') {
                toggleForm();
            }
        });

        function formatSlug(input) {
            let val = input.value;
            val = val.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            input.value = val;
            document.getElementById('enlace-status').innerText = ""; 
        }

        // NUEVA FUNCIÓN: Validador en tiempo real
        function validarCampos(idOriginal, idConfirm, idFeedback) {
            const valOriginal = document.getElementById(idOriginal).value;
            const inputConfirm = document.getElementById(idConfirm);
            const valConfirm = inputConfirm.value;
            const feedback = document.getElementById(idFeedback);

            // Si el campo de confirmación está vacío, limpiamos los estilos
            if (valConfirm === '') {
                feedback.classList.add('hidden');
                inputConfirm.classList.remove('border-red-500', 'border-green-500', 'bg-red-50', 'bg-green-50');
                inputConfirm.classList.add('border-transparent');
                return;
            }

            feedback.classList.remove('hidden');
            
            // Validamos si coinciden
            if (valOriginal === valConfirm) {
                feedback.innerText = '✓ Coinciden correctamente';
                feedback.className = 'text-[11px] font-bold mt-1.5 text-green-600 block transition-all';
                inputConfirm.classList.remove('border-transparent', 'border-red-500', 'bg-red-50', 'focus:border-orange-500');
                inputConfirm.classList.add('border-green-500', 'bg-green-50', 'focus:border-green-500');
            } else {
                feedback.innerText = '✗ No coinciden';
                feedback.className = 'text-[11px] font-bold mt-1.5 text-red-500 block transition-all';
                inputConfirm.classList.remove('border-transparent', 'border-green-500', 'bg-green-50', 'focus:border-orange-500');
                inputConfirm.classList.add('border-red-500', 'bg-red-50', 'focus:border-red-500');
            }
        }

        async function registrarUsuario() {
            const errorElement = document.getElementById('reg-error');
            const btnRegistrar = document.getElementById('btn-registrar');
            
            const nombres = document.getElementById('reg-nombres').value.trim();
            const apellidos = document.getElementById('reg-apellidos').value.trim();
            const ciudad = document.getElementById('reg-ciudad').value.trim();
            const correo = document.getElementById('reg-correo').value.trim();
            const correoConf = document.getElementById('reg-correo-conf').value.trim();
            const numero = document.getElementById('reg-numero').value.trim();
            const numeroConf = document.getElementById('reg-numero-conf').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const passConf = document.getElementById('reg-pass-conf').value;
            const tiendaNombre = document.getElementById('reg-tienda-nombre').value.trim();
            const enlace = document.getElementById('reg-tienda-enlace').value.trim();

            if(!nombres || !apellidos || !ciudad || !correo || !numero || !pass || !tiendaNombre || !enlace) {
                mostrarError(errorElement, "Todos los campos son obligatorios.");
                return;
            }
            if(correo !== correoConf) return mostrarError(errorElement, "Los correos no coinciden.");
            if(numero !== numeroConf) return mostrarError(errorElement, "Los números de teléfono no coinciden.");
            if(pass !== passConf) return mostrarError(errorElement, "Las contraseñas no coinciden.");
            if(pass.length < 6) return mostrarError(errorElement, "La contraseña debe tener al menos 6 caracteres.");

            btnRegistrar.disabled = true;
            btnRegistrar.innerText = "Verificando...";

            try {
                const enlaceRef = db.collection('tiendas').doc(enlace);
                const doc = await enlaceRef.get();
                
                if (doc.exists) {
                    btnRegistrar.disabled = false;
                    btnRegistrar.innerText = "Crear mi Tienda";
                    document.getElementById('enlace-status').innerText = "❌ Este enlace ya está ocupado. Elige otro.";
                    document.getElementById('enlace-status').className = "text-xs mt-1.5 font-semibold text-red-500";
                    return;
                }

                btnRegistrar.innerText = "Creando cuenta...";
                const userCredential = await auth.createUserWithEmailAndPassword(correo, pass);
                const uid = userCredential.user.uid;

                const tiendaData = {
                    propietarioUid: uid,
                    nombres: nombres,
                    apellidos: apellidos,
                    ciudad: ciudad,
                    correo: correo,
                    whatsapp: numero,
                    nombreTienda: tiendaNombre,
                    enlace: enlace,
                    fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                };

                await enlaceRef.set(tiendaData);
                
                alert("¡Cuenta creada con éxito! Redirigiendo a tu panel...");
                window.location.href = "admin.html";

            } catch (error) {
                console.error("Error en registro:", error);
                btnRegistrar.disabled = false;
                btnRegistrar.innerText = "Crear mi Tienda";
                
                if(error.code === 'auth/email-already-in-use') {
                    mostrarError(errorElement, "Este correo ya está registrado.");
                } else {
                    mostrarError(errorElement, "Hubo un error al crear la cuenta. Intenta de nuevo.");
                }
            }
        }

        async function iniciarSesion() {
            const errorElement = document.getElementById('login-error');
            const btnLogin = document.getElementById('btn-login');
            const correo = document.getElementById('login-correo').value.trim();
            const pass = document.getElementById('login-pass').value;

            if(!correo || !pass) return mostrarError(errorElement, "Ingresa correo y contraseña.");

            btnLogin.disabled = true;
            btnLogin.innerText = "Ingresando...";

            try {
                await auth.signInWithEmailAndPassword(correo, pass);
                window.location.href = "admin.html";
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerText = "Ingresar";
                mostrarError(errorElement, "Correo o contraseña incorrectos.");
            }
        }

        async function recuperarPassword() {
            const correo = document.getElementById('login-correo').value.trim();
            if(!correo) {
                alert("Por favor, ingresa tu correo electrónico en el campo superior para enviarte el enlace de recuperación.");
                return;
            }
            try {
                await auth.sendPasswordResetEmail(correo);
                alert("Te hemos enviado un correo electrónico con un enlace para restablecer tu contraseña.");
            } catch (error) {
                console.error(error);
                alert("Hubo un error. Verifica que el correo esté bien escrito y registrado.");
            }
        }

        function mostrarError(elemento, mensaje) {
            elemento.innerText = mensaje;
            elemento.classList.remove('hidden');
        }

    </script>
</body>
</html>
